<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iftekhar's Treatment" />
  <title>Iftekhar — Scalp Treatment Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-icon">🧴</div>
    <h1>Iftekhar's<br/>Treatment Tracker</h1>
    <p>Scalp Psoriasis Treatment — Dr. Sabrina Shahrin</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- TOP NAV -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-title" id="page-title">Dashboard</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="notif-btn" title="Reminders">🔔</button>
      <button class="icon-btn" id="settings-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main id="main-content"></main>

  <!-- BOTTOM NAV -->
  <nav class="bottomnav">
    <button class="nav-btn active" data-page="dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-page="medicines">
      <span class="nav-icon">💊</span>
      <span class="nav-label">Medicines</span>
    </button>
    <button class="nav-btn" data-page="routine">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Routine</span>
    </button>
    <button class="nav-btn" data-page="progress">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-btn" data-page="log">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Log</span>
    </button>
  </nav>
</div>

<!-- MODAL OVERLAY -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box"></div>
</div>

<script src="script.js"></script>
</body>
</html>
